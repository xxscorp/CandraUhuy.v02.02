 <!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    :root {
      --bg-overlay: rgba(0,0,0,0.75);
      --glass-bg: rgba(20, 20, 20, 0.7);
      --text-main: #f5f5f7;
      --text-sub: #9ca3af;
    }
    html.light {
      --bg-overlay: rgba(255,255,255,0.7);
      --glass-bg: rgba(255, 255, 255, 0.7);
      --text-main: #111827;
      --text-sub: #4b5563;
    }
    body {
      font-family: 'Inter', sans-serif;
      color: var(--text-main);
      overflow-x: hidden;
      transition: color 0.3s ease;
    }
 .bg-main {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      z-index: -2;
    }
 .overlay {
      position: fixed;
      inset: 0;
      background: var(--bg-overlay);
      z-index: -1;
      transition: background 0.3s ease;
    }
 .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
 .link-btn {
      transition: all 0.25s ease;
      min-height: 72px;
    }
 .link-btn:hover {
      transform: translateY(-2px);
      background: rgba(220, 38, 38, 0.2);
      box-shadow: 0 8px 25px rgba(220, 38, 38, 0.3);
    }
 .avatar-wrap {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 20px;
      box-shadow: 0 0 60px rgba(220, 38, 38, 0.8), 0 0 100px rgba(220, 38, 38, 0.4);
      border: 2px solid #8B0000;
      background: #1a1a1a;
    }
 .avatar-wrap img,.avatar-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    #toast {
      position: fixed;
      bottom: -100px;
      left: 50%;
      transform: translateX(-50%);
      transition: bottom 0.5s ease;
      z-index: 100;
    }
    #toast.show { bottom: 30px; }
 .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 50;
      align-items: center;
      justify-content: center;
    }
 .modal.active { display: flex; }

    /* BANNER UDAH GW TINGGIIN JADI 240PX */
 .banner-carousel {
      width: 100%;
      height: 240px;
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(220, 38, 38, 0.4);
      background: #1a1a1a;
    }
 .banner-slides {
      display: flex;
      width: 300%;
      height: 100%;
      transition: transform 0.5s ease-in-out;
    }
 .banner-slide {
      width: 33.333%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }
 .banner-slide img,.banner-slide video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
 .banner-slide::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
    }
 .banner-text {
      position: absolute;
      bottom: 15px;
      left: 0;
      width: 100%;
      font-weight: 800;
      font-size: 1rem;
      text-shadow: 0 2px 10px #000;
      letter-spacing: 2px;
      z-index: 2;
      padding: 0 15px;
    }
 .banner-dots {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 3;
    }
 .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      cursor: pointer;
      transition: 0.3s;
    }
 .dot.active {
      background: #ff0000;
      width: 20px;
      border-radius: 4px;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="bg-main" id="bgMain"></div>

  <div id="toast" class="glass px-6 py-3 rounded-full text-sm font-semibold">

  <div id="qrModal" class="modal p-4" onclick="closeModal('qrModal')">

  <div class="w-full max-w-md mx-auto relative z-10 py-8">

    <div class="flex justify-between items-center mb-6">

      <div class="flex gap-2">

    <!-- PROFILE -->

    <!-- LAYOUT UDAH GW BENERIN - GA ADA KOTAK KOSONG LAGI -->

    <div class="text-center mt-12 text-xs" style="color: var(--text-sub)">

  </div>

  <script>
    // LOAD CONFIG
    document.getElementById('bgMain').style.backgroundImage = `url('${CONFIG.background}')`;

    // AVATAR BISA VIDEO/GAMBAR
    const avatarWrap = document.getElementById('avatarWrap');
    if(CONFIG.avatar.type === 'video') {
      avatarWrap.innerHTML = `<video src="${CONFIG.avatar.src}" autoplay loop muted playsinline></video>`;
    } else {
      avatarWrap.innerHTML = `<img src="${CONFIG.avatar.src}" alt="Candra">`;
    }

    document.getElementById('linkWA').href = CONFIG.links.whatsapp;
    document.getElementById('linkIG').href = CONFIG.links.instagram;
    document.getElementById('linkTT').href = CONFIG.links.tiktok;
    document.getElementById('linkFB').href = CONFIG.links.facebook;

    // VISITOR COUNTER
    let count = localStorage.getItem('candra_visitors') || 0;
    count++;
    localStorage.setItem('candra_visitors', count);
    document.getElementById('visitorCount').innerText = count;

    // THEME TOGGLE
    function toggleTheme() {
      const html = document.documentElement;
      const btn = document.getElementById('themeBtn');
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        html.classList.add('light');
        btn.innerHTML = '<i class="fa-solid fa-moon"></i>';
        localStorage.setItem('theme', 'light');
      } else {
        html.classList.remove('light');
        html.classList.add('dark');
        btn.innerHTML = '<i class="fa-solid fa-sun"></i>';
        localStorage.setItem('theme', 'dark');
      }
    }
    if (localStorage.getItem('theme') === 'light') toggleTheme();

    // TOAST
    function showToast(msg) {
      const toast = document.getElementById('toast');
      document.getElementById('toastText').innerText = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
    function copyText(text, msg) {
      navigator.clipboard.writeText(text);
      showToast(msg);
    }

    // MODAL
    function closeModal(id) {
      document.getElementById(id).classList.remove('active');
    }
    function showQR() {
      const qrDiv = document.getElementById('qrcode');
      qrDiv.innerHTML = '';
      new QRCode(qrDiv, {
        text: window.location.href,
        width: 180,
        height: 180,
        colorDark: "#000000",
        colorLight: "#ffffff",
      });
      document.getElementById('qrModal').classList.add('active');
    }

    // BANNER CAROUSEL - SUPPORT VIDEO
    const slides = document.getElementById('slides');
    const dotsContainer = document.getElementById('dots');

    CONFIG.slides.forEach((slide, i) => {
      const slideDiv = document.createElement('div');
      slideDiv.className = 'banner-slide';

      if(slide.type === 'video') {
        slideDiv.innerHTML = `
          <video src="${slide.src}" autoplay loop muted playsinline></video>
          <div class="banner-text">${slide.text}</div>
        `;
      } else {
        slideDiv.innerHTML = `
          <img src="${slide.src}" alt="Slide ${i+1}">
          <div class="banner-text">${slide.text}</div>
        `;
      }
      slides.appendChild(slideDiv);

      const dot = document.createElement('div');
      dot.classList.add('dot');
      if(i === 0) dot.classList.add('active');
      dot.addEventListener('click', () => goToSlide(i));
      dotsContainer.appendChild(dot);
    });

    const dots = document.querySelectorAll('.dot');
    let currentSlide = 0;

    function goToSlide(n) {
      currentSlide = n;
      slides.style.transform = `translateX(-${currentSlide * 33.333}%)`;
      dots.forEach((dot, i) => {
        dot.classList.toggle('active', i === currentSlide);
      });
    }

    setInterval(() => {
      currentSlide = (currentSlide + 1) % CONFIG.slides.length;
      goToSlide(currentSlide);
    }, 4000);

    // SWIPE HP
    let startX = 0;
    slides.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
    });
    slides.addEventListener('touchend', e => {
      let endX = e.changedTouches[0].clientX;
      if(startX - endX > 50) {
        currentSlide = (currentSlide + 1) % CONFIG.slides.length;
        goToSlide(currentSlide);
      } else if(endX - startX > 50) {
        currentSlide = (currentSlide - 1 + CONFIG.slides.length) % CONFIG.slides.length;
        goToSlide(currentSlide);
      }
    });
  </script>

</body>
